<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css" integrity="sha384-oS3vJWv+0UjzBfQzYUhtDYW+Pj2yciDJxpsK1OYPAYjqT085Qq/1cq5FLXAZQ7Ay" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,700;1,300&display=swap" rel="stylesheet">

    <title>{% block title %}{% endblock %}</title>

    <style>
      :root {
        --red:      #e8503a;
        --red-soft: rgba(232,80,58,0.10);
        --bg:       #0d1117;
        --card-bdr: rgba(255,255,255,0.07);
        --white:    #f0f4fc;
        --muted:    rgba(200,210,230,0.55);
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0; padding: 0;
        background: var(--bg);
        color: var(--white);
      }

      /* ── NAVBAR ── */
      .navbar {
        background: rgba(13,17,23,0.92) !important;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--card-bdr);
        box-shadow: 0 2px 24px rgba(0,0,0,0.4);
        padding: 0 0;
        min-height: 56px;
      }

      .navbar-brand {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        font-weight: 800 !important;
        font-size: 18px !important;
        color: var(--white) !important;
        letter-spacing: -0.3px;
        padding: 16px 0 !important;
        text-decoration: none;
      }
      .navbar-brand span { color: var(--red); }

      /* nav links */
      .navbar-nav .nav-item .nav-link {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        font-size: 11px !important;
        font-weight: 700 !important;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: rgba(200,210,230,0.55) !important;
        padding: 18px 16px !important;
        position: relative;
        transition: color 0.2s;
        text-decoration: none;
      }
      .navbar-nav .nav-item .nav-link::after {
        content: '';
        position: absolute;
        bottom: 10px; left: 16px; right: 16px;
        height: 2px;
        background: var(--red);
        border-radius: 2px;
        transform: scaleX(0);
        transition: transform 0.25s ease;
      }
      .navbar-nav .nav-item .nav-link:hover {
        color: var(--white) !important;
      }
      .navbar-nav .nav-item .nav-link:hover::after {
        transform: scaleX(1);
      }

      /* toggler */
      .navbar-toggler {
        border-color: var(--card-bdr) !important;
      }
      .navbar-toggler-icon {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' width='30' height='30' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(200,210,230,0.6)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e") !important;
      }

      /* alerts */
      .alert { border-radius: 10px; font-size: 14px; }

      /* container override — no white box */
      .container { background: transparent !important; box-shadow: none !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a href="/" class="navbar-brand">Neuro<span>Detect</span></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
                        <!--<li class="nav-item"><a href="{% url 'Deploy_8' %}" class="nav-link">Model</a></li>-->
                        <li class="nav-item"><a href="{% url 'Database' %}" class="nav-link">Database</a></li>
                        <li class="nav-item"><a href="{% url 'users-profile' %}" class="nav-link">Profile</a></li>
                        <li class="nav-item"><a href="{% url 'logout_view' %}" class="nav-link">Logout</a></li>
                    {% else %}
                        <li class="nav-item"><a href="{% url 'login' %}" class="nav-link">Sign in</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-12">
                {% if messages %}
                    <div style="margin-top:70px;">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                    {% endfor %}
                    </div>
                {% endif %}
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
